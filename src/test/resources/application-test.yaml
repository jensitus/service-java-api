spring:
  application:
    name: service-b.org
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        ddl-auto: none
        show-sql: true
        temp.use_jdbc_metadata_defaults: false
  datasource:
    url: jdbc:postgresql://localhost:5434/service
    username: service
    password: dev123
  sql:
    init:
      mode: always
      continue-on-error: true
  liquibase:
    enabled: true
    change-log: classpath:/config/liquibase/db.changelog-master.xml

  mail:
    properties:
      mail:
        smtp:
          auth: false
